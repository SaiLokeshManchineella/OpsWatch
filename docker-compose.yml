version: '3.8'

services:
  backend:
    build: ./backend
    container_name: opswatch_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/" ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    container_name: opswatch_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
